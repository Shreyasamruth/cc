<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Quantum Computing in the Cloud{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-gradient-to-br from-blue-900 via-purple-900 to-indigo-900 min-h-screen text-white">
    <!-- Enhanced Navigation -->
    <nav class="bg-black bg-opacity-40 backdrop-blur-md border-b border-white border-opacity-20 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <h1 class="text-xl font-bold text-cyan-400 hover:text-cyan-300 transition-colors duration-200 cursor-pointer">
                            <i class="fas fa-atom mr-2 animate-spin-slow"></i>
                            <span class="bg-gradient-to-r from-cyan-400 to-blue-400 bg-clip-text text-transparent">
                                Quantum Cloud
                            </span>
                        </h1>
                    </div>
                </div>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-4">
                        <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
                            <i class="fas fa-home mr-1"></i>Home
                        </a>
                        <a href="{{ url_for('about') }}" class="nav-link {% if request.endpoint == 'about' %}active{% endif %}">
                            <i class="fas fa-info-circle mr-1"></i>About
                        </a>
                        <a href="{{ url_for('concepts') }}" class="nav-link {% if request.endpoint == 'concepts' %}active{% endif %}">
                            <i class="fas fa-book mr-1"></i>Concepts
                        </a>
                        <a href="{{ url_for('simulation') }}" class="nav-link {% if request.endpoint == 'simulation' %}active{% endif %}">
                            <i class="fas fa-cogs mr-1"></i>Simulator
                        </a>
                        <a href="{{ url_for('contact') }}" class="nav-link {% if request.endpoint == 'contact' %}active{% endif %}">
                            <i class="fas fa-envelope mr-1"></i>Contact
                        </a>
                    </div>
                </div>
                <!-- Mobile menu button -->
                <div class="md:hidden">
                    <button type="button" class="mobile-menu-button">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>
        </div>
        <!-- Mobile menu -->
        <div class="md:hidden mobile-menu hidden">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3 bg-black bg-opacity-50">
                <a href="{{ url_for('index') }}" class="mobile-nav-link">Home</a>
                <a href="{{ url_for('about') }}" class="mobile-nav-link">About</a>
                <a href="{{ url_for('concepts') }}" class="mobile-nav-link">Concepts</a>
                <a href="{{ url_for('simulation') }}" class="mobile-nav-link">Simulator</a>
                <a href="{{ url_for('contact') }}" class="mobile-nav-link">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Main content -->
    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-black bg-opacity-30 backdrop-blur-md border-t border-white border-opacity-20 mt-12">
        <div class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
            <div class="text-center">
                <p class="text-gray-300">
                    &copy; 2024 Quantum Computing in the Cloud. 
                    <span class="text-cyan-400">Exploring the quantum frontier.</span>
                </p>
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
